<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-width=1.0">
    <title>Multimodal Agentic RAG</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/lib/marked.umd.js"></script>
    <style>
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        
        /* NEW: Styles to make Markdown tables and bold text look beautiful */
        .markdown-body table { width: 100%; border-collapse: collapse; margin-top: 10px; margin-bottom: 10px; font-size: 0.875rem; }
        .markdown-body th, .markdown-body td { border: 1px solid #e2e8f0; padding: 8px 12px; text-align: left; }
        .markdown-body th { background-color: #f8fafc; font-weight: 600; }
        .markdown-body p { margin-bottom: 8px; }
        .markdown-body strong { font-weight: 600; color: #334155; }
    </style>
</head>
<body class="bg-white h-screen flex font-sans text-slate-800 overflow-hidden">

    <aside class="w-64 bg-slate-50 border-r border-slate-200 flex flex-col">
        <div class="p-4 border-b border-slate-200">
            <h1 class="text-xl font-bold text-indigo-600">Agentic RAG</h1>
            <p class="text-xs text-slate-500 mt-1">Multimodal Database</p>
        </div>
        
        <div class="p-4">
            <button id="new-chat-btn" class="w-full bg-white border border-slate-300 hover:bg-slate-100 text-slate-700 font-medium py-2 px-4 rounded-lg flex items-center justify-center gap-2 transition-colors shadow-sm">
                <span>+</span> New Chat
            </button>
        </div>

        <div id="chat-list" class="flex-1 overflow-y-auto no-scrollbar px-3 space-y-1">
            </div>

        <div class="p-4 border-t border-slate-200">
            <button id="reset-btn" class="w-full bg-red-50 text-red-600 hover:bg-red-100 font-medium py-2 px-4 rounded-lg transition-colors">
                Reset System
            </button>
        </div>
    </aside>

    <main class="flex-1 flex flex-col h-full bg-white relative">
        
        <header class="h-16 border-b border-slate-200 flex items-center justify-between px-6 bg-white shrink-0">
            <div class="flex space-x-1 bg-slate-100 p-1 rounded-lg">
                <button id="tab-chat" class="px-4 py-1.5 text-sm font-medium rounded-md bg-white text-indigo-600 shadow-sm transition-all">Chat</button>
                <button id="tab-docs" class="px-4 py-1.5 text-sm font-medium rounded-md text-slate-500 hover:text-slate-700 transition-all">Documents</button>
            </div>

            <div class="flex items-center gap-3">
                <span id="upload-status" class="text-xs font-medium text-slate-500 hidden"></span>
                <input type="file" id="file-upload" accept=".pdf" class="text-sm text-slate-500 file:mr-3 file:py-1.5 file:px-3 file:rounded-md file:border-0 file:text-xs file:font-semibold file:bg-indigo-50 file:text-indigo-700 hover:file:bg-indigo-100 cursor-pointer" />
                <button id="upload-btn" class="bg-indigo-600 hover:bg-indigo-700 text-white text-sm font-medium py-1.5 px-4 rounded-md transition-colors shadow-sm">
                    Upload
                </button>
            </div>
        </header>

        <div id="view-chat" class="flex-1 flex flex-col overflow-hidden">
            <div id="chat-box" class="flex-1 overflow-y-auto p-6 flex flex-col gap-6 bg-slate-50/50">
                </div>
            <div class="p-4 bg-white border-t border-slate-200 shrink-0">
                <div class="max-w-4xl mx-auto flex gap-2">
                    <input type="text" id="chat-input" class="flex-1 border border-slate-300 rounded-xl p-3 focus:outline-none focus:border-indigo-500 focus:ring-1 focus:ring-indigo-500" placeholder="Ask a question about your documents..." />
                    <button id="send-btn" class="bg-indigo-600 hover:bg-indigo-700 text-white font-medium py-3 px-6 rounded-xl transition-colors shadow-sm">
                        Send
                    </button>
                </div>
            </div>
        </div>

       <div id="view-docs" class="flex-1 flex flex-col overflow-hidden hidden bg-slate-50">
            <div class="p-4 border-b border-slate-200 bg-white shrink-0 flex items-center justify-between">
                <h2 class="font-semibold text-slate-800">Database Chunks</h2>
                <input type="text" id="chunk-search" class="border border-slate-300 rounded-lg p-2 text-sm w-64 focus:outline-none focus:border-indigo-500" placeholder="Filter chunks by text..." />
            </div>
            <div id="chunks-grid" class="flex-1 overflow-y-auto p-6 grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4 auto-rows-max">
            </div>
        </div>

    </main>

    <script src="app.js"></script>
</body>
</html>
